# L2 bench compose: Qwen3.5-122B-A10B Q4_K_M TS=5 on GPUs 0-4.
name: viiwork-qwen35-122b-bench
services:
  viiwork-qwen35-122b-bench:
    image: viiwork:qwen-test
    container_name: viiwork-qwen35-122b-bench
    network_mode: host
    ipc: host
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - ../models:/models
      - ./viiwork.qwen35-122b-bench.yaml:/etc/viiwork/viiwork.yaml
    group_add:
      - video
      - render
    restart: unless-stopped
