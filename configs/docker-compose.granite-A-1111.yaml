# Granite 4.1-8B Layout A: 4× single-GPU replicas.
#
# Run / probe:
#   Up:     docker compose -f configs/docker-compose.granite-A-1111.yaml up -d
#   Logs:   docker logs -f viiwork-granite-a
#   Probe:  curl -s http://localhost:8095/v1/models | jq
#   Status: curl -s http://localhost:8095/v1/status | jq
#   Down:   docker compose -f configs/docker-compose.granite-A-1111.yaml down
name: viiwork-granite-a
services:
  viiwork-granite-a:
    image: viiwork:granite-test
    container_name: viiwork-granite-a
    network_mode: host
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - ../models:/models
      - ./viiwork.granite-A-1111.yaml:/etc/viiwork/viiwork.yaml
    group_add:
      - video
      - render
    restart: "no"
