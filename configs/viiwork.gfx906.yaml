server:
  host: 0.0.0.0
  port: 8090

model:
  path: /models/gemma-4-26B-A4B-it-UD-Q3_K_XL.gguf
  context_size: 13337
  n_gpu_layers: -1

gpus:
  # Explicit physical GPU indices (4, 5, 6) so this instance never
  # collides with the production viiwork on GPUs 0-2 or with the
  # bench harness on GPU 3.
  devices: [4, 5, 6]
  base_port: 9011
  # power_limit_watts: 180

backend:
  binary: llama-server
  extra_args: ["--reasoning-format", "deepseek", "-fa", "on", "--cache-type-k", "q4_0", "--cache-type-v", "q4_0"]

health:
  interval: 5s
  timeout: 3s
  max_failures: 3

balancer:
  strategy: adaptive
  latency_window: 30s
  high_load_threshold: 7
  max_in_flight_per_gpu: 1
