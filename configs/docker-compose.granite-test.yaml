# Granite 4.1-8B bring-up test compose.
#
# Prereqs:
#   1. Stop production viiwork (HSA single-container constraint):
#        docker compose -f configs/docker-compose.gfx906.yaml down
#   2. Confirm GPU 9 is free:
#        rocm-smi --showpids
#   3. Download model (~5 GB, one time):
#        ./scripts/download-granite41-8b.sh
#   4. Build test image (~10 min, one time):
#        docker build -t viiwork:granite-test -f Dockerfile.granite-test .
#
# Run / probe:
#   Up:     docker compose -f configs/docker-compose.granite-test.yaml up -d
#   Logs:   docker logs -f viiwork-granite-test
#   Probe:  curl -s http://localhost:8095/v1/models | jq
#   Test:   curl -s http://localhost:8095/v1/chat/completions \
#             -H 'Content-Type: application/json' \
#             -d '{"model":"granite-4.1-8b.Q4_K_M",
#                  "messages":[{"role":"user","content":"hello"}]}'
#   Down:   docker compose -f configs/docker-compose.granite-test.yaml down
#
# Failure modes to watch:
#   - "unsupported architecture"  -> rebuild with newer LLAMA_CPP_REF
#   - Slow-as-CPU throughput      -> ROCm gfx906 op fallback; check logs
#   - Garbled output              -> chat-template mismatch in GGUF
name: viiwork-granite-test
services:
  viiwork-granite-test:
    image: viiwork:granite-test
    container_name: viiwork-granite-test
    network_mode: host
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - ../models:/models
      - ./viiwork.granite-test.yaml:/etc/viiwork/viiwork.yaml
    group_add:
      - video
      - render
    restart: "no"
