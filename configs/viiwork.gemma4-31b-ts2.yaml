# Gemma 4 31B-it Q5_K_S — single TS=2 backend on gb1.
#
# 33B dense Image-Text-to-Text (used here for text-only prose generation).
# TS=2 splits the ~21.5GB Q5_K_S weights across two Radeon VII (~11GB each)
# with KV headroom for short prompt + paragraph-length output.
#
# Use case: weather/road-accident/works data → English prose paragraph.
# Translation is a separate step on the EuroLLM peer at localhost:8095.
server:
  host: 0.0.0.0
  port: 8094

model:
  path: /models/gemma-4-31B-it-Q5_K_S.gguf
  context_size: 16384
  n_gpu_layers: -1

gpus:
  devices: [0, 1]
  base_port: 9501
  tensor_split:
    enabled: true
    mode: layer
    group_size: 2
  # 180W per-GPU cap is persistent on host.

backend:
  binary: llama-server
  extra_args: []

health:
  interval: 5s
  timeout: 10s

balancer:
  latency_window: 30s
  high_load_threshold: 8
  max_in_flight_per_gpu: 2

peers:
  hosts:
    - localhost:8095
  poll_interval: 10s
  timeout: 5s
