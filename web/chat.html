<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viiwork chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; height: 100vh; }
  header { padding: 12px 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  header a { color: #58a6ff; text-decoration: none; font-size: 1.1rem; font-weight: 600; }
  header a:hover { text-decoration: underline; }
  select { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 10px; font-family: inherit; font-size: 0.85rem; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; font-size: 0.9rem; }
  .msg.user { align-self: flex-end; background: #1f6feb; color: #fff; border-bottom-right-radius: 2px; }
  .msg.assistant { align-self: flex-start; background: #161b22; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
  .msg.assistant .thinking { color: #8b949e; font-style: italic; border-left: 2px solid #30363d; padding-left: 10px; margin-bottom: 8px; }
  .msg.error { align-self: center; background: #f8514922; border: 1px solid #f85149; color: #f85149; }
  #input-area { padding: 16px 20px; border-top: 1px solid #30363d; flex-shrink: 0; }
  #input-row { display: flex; gap: 10px; }
  #prompt { flex: 1; background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-family: inherit; font-size: 0.9rem; resize: none; outline: none; min-height: 44px; max-height: 200px; }
  #prompt:focus { border-color: #58a6ff; }
  #prompt::placeholder { color: #484f58; }
  button { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-family: inherit; font-size: 0.9rem; cursor: pointer; flex-shrink: 0; }
  button:hover { background: #2ea043; }
  button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  .meta { font-size: 0.75rem; color: #484f58; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <a href="/">viiwork</a>
  <span style="color:#484f58">/</span>
  <span style="color:#c9d1d9;font-weight:600">chat</span>
  <select id="model-select"><option>loading...</option></select>
</header>

<div id="messages"></div>

<div id="input-area">
  <div id="input-row">
    <textarea id="prompt" rows="1" placeholder="Send a message..." autofocus></textarea>
    <button id="send" onclick="send()">Send</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const promptEl = document.getElementById('prompt');
const sendBtn = document.getElementById('send');
const modelSelect = document.getElementById('model-select');

let conversation = [];
let streaming = false;

// Auto-resize textarea
promptEl.addEventListener('input', () => {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + 'px';
});

// Enter to send, Shift+Enter for newline
promptEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!streaming) send();
  }
});

// Load models
async function loadModels() {
  try {
    const resp = await fetch('/v1/models');
    const data = await resp.json();
    modelSelect.innerHTML = '';
    for (const m of data.data) {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.id;
      modelSelect.appendChild(opt);
    }
  } catch (e) {
    modelSelect.innerHTML = '<option>error loading models</option>';
  }
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function send() {
  const text = promptEl.value.trim();
  if (!text || streaming) return;

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });
  promptEl.value = '';
  promptEl.style.height = 'auto';

  streaming = true;
  sendBtn.disabled = true;
  sendBtn.textContent = '...';

  const msgDiv = addMessage('assistant', '');
  let fullText = '';
  let thinkText = '';
  let inThink = false;
  const t0 = performance.now();

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelSelect.value,
        messages: conversation,
        stream: true
      })
    });

    if (!resp.ok) {
      const err = await resp.text();
      msgDiv.className = 'msg error';
      msgDiv.textContent = resp.status + ': ' + err;
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') continue;

        try {
          const chunk = JSON.parse(payload);
          const delta = chunk.choices?.[0]?.delta;
          if (!delta) continue;

          // Handle thinking content (Gemma 4 thinking mode)
          if (delta.reasoning_content) {
            thinkText += delta.reasoning_content;
            inThink = true;
          }
          if (delta.content) {
            fullText += delta.content;
          }

          // Render
          msgDiv.innerHTML = '';
          if (thinkText) {
            const thinkEl = document.createElement('div');
            thinkEl.className = 'thinking';
            thinkEl.textContent = thinkText;
            msgDiv.appendChild(thinkEl);
          }
          const contentEl = document.createTextNode(fullText);
          msgDiv.appendChild(contentEl);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } catch (e) { /* skip malformed chunks */ }
      }
    }

    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = modelSelect.value + ' | ' + elapsed + 's';
    msgDiv.appendChild(meta);

    conversation.push({ role: 'assistant', content: fullText });

  } catch (e) {
    msgDiv.className = 'msg error';
    msgDiv.textContent = 'Error: ' + e.message;
  } finally {
    streaming = false;
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send';
    promptEl.focus();
  }
}

loadModels();
</script>
</body>
</html>
