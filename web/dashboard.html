<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viiwork mesh</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0d1117; color: #c9d1d9; padding: 24px; }
  h1 { font-size: 1.4rem; margin-bottom: 16px; color: #58a6ff; }
  h2 { font-size: 1.1rem; margin: 20px 0 10px; color: #8b949e; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
  .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
  .healthy, .reachable { background: #3fb950; }
  .unhealthy { background: #d29922; }
  .dead, .unreachable { background: #f85149; }
  .starting { background: #8b949e; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 12px; border-bottom: 1px solid #21262d; }
  th { color: #8b949e; font-weight: 500; font-size: 0.85rem; }
  .models { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .model-tag { background: #1f6feb22; border: 1px solid #1f6feb; border-radius: 4px; padding: 2px 8px; font-size: 0.85rem; color: #58a6ff; }
  .summary { display: flex; gap: 24px; margin-bottom: 16px; font-size: 0.9rem; flex-wrap: wrap; }
  .summary span { color: #8b949e; }
  .summary strong { color: #c9d1d9; }
  #error { color: #f85149; display: none; margin-bottom: 12px; }
  canvas { width: 100%; margin-bottom: 8px; border: 1px solid #21262d; border-radius: 4px; }
  #footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #21262d; color: #484f58; font-size: 0.75rem; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 20px; align-items: start; }
  .two-col > div > h2 { margin-top: 0; }
  .left-col { display: flex; flex-direction: column; }
  .left-col #activity-log { flex: 1; overflow-y: auto; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>viiwork mesh</h1>
<div id="error"></div>
<div id="summary" class="summary"></div>
<div id="peers-section"></div>
<div class="two-col">
  <div class="left-col" id="activity-section">
    <div id="cluster-models"></div>
    <div id="inflight-section" style="display:none;margin-bottom:12px">
      <h2>In-Flight Requests</h2>
      <div id="inflight-list" class="card" style="font-size:0.8rem;font-family:monospace;padding:8px 12px"></div>
    </div>
    <h2>Activity</h2>
    <div id="activity-log" class="card" style="overflow-y:auto;font-size:0.8rem;font-family:monospace;padding:8px 12px"></div>
  </div>
  <div>
    <div id="backends-section"></div>
    <div id="hostmem-section" style="display:none;margin-bottom:12px">
      <div style="position:relative">
        <canvas id="graph-hostmem" height="120"></canvas>
        <span id="hostmem-live" style="position:absolute;top:4px;right:8px;font-size:0.8rem;font-family:monospace;color:#bc8cff"></span>
      </div>
    </div>
    <div id="graphs-section" style="display:none">
      <h2>GPU Metrics (1h)</h2>
      <canvas id="graph-util" height="160"></canvas>
      <canvas id="graph-vram" height="160"></canvas>
      <canvas id="graph-power" height="120"></canvas>
    </div>
    <div id="graphs-unavailable" style="display:none;color:#8b949e;text-align:center;padding:40px">GPU metrics unavailable</div>
  </div>
</div>
<div id="footer"></div>

<script>
// --- Cluster status (existing) ---
let clusterVersion = '';

async function refresh() {
  try {
    const resp = await fetch('/v1/cluster');
    if (!resp.ok) throw new Error('fetch failed');
    const data = await resp.json();
    document.getElementById('error').style.display = 'none';
    if (data.version) clusterVersion = data.version;
    render(data);
  } catch (e) {
    document.getElementById('error').textContent = 'Failed to fetch cluster state: ' + e.message;
    document.getElementById('error').style.display = 'block';
  }
}

function render(data) {
  const totalGPUs = data.local.backends.length +
    (data.peers || []).reduce((s, p) => s + (p.healthy_backends || 0), 0);
  const healthyGPUs = data.local.backends.filter(b => b.status === 'healthy').length +
    (data.peers || []).reduce((s, p) => s + (p.healthy_backends || 0), 0);
  const totalPower = (data.local.power_available ? data.local.power_watts : 0) +
    (data.peers || []).reduce((s, p) => s + (p.power_available ? p.power_watts : 0), 0);
  const clusterCost = data.cluster_cost_eur_per_hour || 0;
  const clusterCostToday = data.cluster_cost_today_eur || 0;

  document.getElementById('summary').innerHTML = `
    <div><span>Node:</span> <strong>${escapeHtml(data.node_id)}</strong></div>
    <div><span>Models:</span> <strong>${(data.models || []).length}</strong></div>
    <div><span>GPUs:</span> <strong>${healthyGPUs}/${totalGPUs} healthy</strong></div>
    <div><span>Peers:</span> <strong>${(data.peers || []).filter(p => p.status === 'reachable').length}/${(data.peers || []).length} reachable</strong></div>
    <div><span>Power:</span> <strong>${totalPower > 0 ? totalPower + 'W' : 'N/A'}</strong></div>
    <div><span>Cost:</span> <strong>${clusterCost > 0 ? clusterCost.toFixed(2) + ' EUR/h' : 'N/A'}</strong></div>
    <div><span>Today:</span> <strong>${clusterCostToday > 0 ? clusterCostToday.toFixed(2) + ' EUR' : 'N/A'}</strong></div>
  `;

  // Local Backends → right column (merged with backend stats)
  let backendsHtml = '<h2>Local Backends (' + data.local.model + ')';
  if (data.local.power_available) backendsHtml += ' \u2014 ' + data.local.power_watts + 'W';
  if (data.local.cost_available) backendsHtml += ' \u2014 ' + data.local.cost_eur_per_hour.toFixed(2) + ' EUR/h';
  backendsHtml += '</h2><div class="card"><table>';
  backendsHtml += '<tr><th></th><th>GPU</th><th>In-Flight</th><th>RSS</th><th>GPU%</th><th>VRAM</th><th>Context Use</th></tr>';
  for (const b of data.local.backends) {
    const gpuColor = GPU_COLORS[b.gpu_id % GPU_COLORS.length];
    const gpuKey = String(b.gpu_id);
    backendsHtml += `<tr>`;
    backendsHtml += `<td><span class="status ${b.status}"></span></td>`;
    backendsHtml += `<td style="color:${gpuColor}">gpu-${b.gpu_id}</td>`;
    backendsHtml += `<td>${b.in_flight || 0}</td>`;

    if (b.rss_mb) {
      if (!backendRSSHistory[b.gpu_id]) backendRSSHistory[b.gpu_id] = [];
      backendRSSHistory[b.gpu_id].push({t: Math.floor(Date.now()/1000), rss: b.rss_mb});
      if (backendRSSHistory[b.gpu_id].length > RSS_HISTORY_MAX)
        backendRSSHistory[b.gpu_id] = backendRSSHistory[b.gpu_id].slice(-RSS_HISTORY_MAX);
      const rssLabel = b.rss_mb >= 1024 ? (b.rss_mb / 1024).toFixed(1) + 'G' : b.rss_mb + 'M';
      const history = backendRSSHistory[b.gpu_id];
      let trend = '\u2192', trendColor = '#8b949e';
      if (history.length >= 10) {
        const half = Math.floor(history.length / 2);
        const earlyAvg = history.slice(0, half).reduce((s, h) => s + h.rss, 0) / half;
        const lateAvg = history.slice(-half).reduce((s, h) => s + h.rss, 0) / half;
        const pct = ((lateAvg - earlyAvg) / earlyAvg) * 100;
        if (pct > 2) { trend = '\u2191'; trendColor = pct > 10 ? '#f85149' : '#d29922'; }
        else if (pct < -2) { trend = '\u2193'; trendColor = '#3fb950'; }
      }
      backendsHtml += `<td><span style="color:${trendColor};font-weight:bold">${trend}</span> ${rssLabel}</td>`;
    } else {
      backendsHtml += `<td></td>`;
    }

    // GPU utilization from metrics stream
    const gpuSamples = metricsData[gpuKey];
    if (gpuSamples && gpuSamples.length > 0) {
      const latest = gpuSamples[gpuSamples.length - 1];
      const util = Math.round(latest.util);
      let utilColor = '#8b949e';
      if (util > 80) utilColor = '#f85149';
      else if (util > 40) utilColor = '#d29922';
      else if (util > 0) utilColor = '#3fb950';
      backendsHtml += `<td style="color:${utilColor}">${util}%</td>`;
    } else {
      backendsHtml += `<td></td>`;
    }

    // VRAM usage from metrics stream
    if (gpuSamples && gpuSamples.length > 0) {
      const latest = gpuSamples[gpuSamples.length - 1];
      const vramGB = (latest.vram_used_mb / 1024).toFixed(1);
      const totalGB = ((vramTotalMB[gpuKey] || 16368) / 1024).toFixed(0);
      backendsHtml += `<td>${vramGB}/${totalGB}G</td>`;
    } else {
      backendsHtml += `<td></td>`;
    }

    // Context use (decoded tokens / configured context size)
    if (b.slot_count > 0) {
      const decoded = b.tok_decoded || 0;
      const total = b.slot_ctx || 0;
      if ((b.slot_active || 0) > 0 && total > 0) {
        const pct = Math.round((decoded / total) * 100);
        let barColor = '#58a6ff';
        if (pct > 80) barColor = '#3fb950';
        backendsHtml += `<td><div style="display:flex;align-items:center;gap:4px;min-width:100px">`;
        backendsHtml += `<span style="flex:1;height:8px;background:#21262d;border-radius:2px;overflow:hidden">`;
        backendsHtml += `<span style="display:block;width:${pct}%;height:100%;background:${barColor};border-radius:2px"></span>`;
        backendsHtml += `</span>`;
        backendsHtml += `<span style="color:${barColor};font-size:0.8rem">${decoded}/${total}t</span>`;
        backendsHtml += `</div></td>`;
      } else {
        backendsHtml += `<td style="color:#484f58">idle</td>`;
      }
    } else {
      backendsHtml += `<td></td>`;
    }

    backendsHtml += `</tr>`;
  }
  backendsHtml += '</table></div>';
  document.getElementById('backends-section').innerHTML = backendsHtml;

  // Peers → full width above the two-col
  let peersHtml = '';
  if (data.peers && data.peers.length > 0) {
    peersHtml += '<h2>Peers</h2>';
    for (const p of data.peers) {
      peersHtml += '<div class="card"><table>';
      peersHtml += `<tr><td><span class="status ${escapeHtml(p.status)}"></span><strong>${escapeHtml(p.addr)}</strong></td><td>${escapeHtml(p.status)}</td>`;
      if (p.status === 'reachable') {
        peersHtml += `<td>${escapeHtml(p.node_id)}</td><td>${p.healthy_backends} GPUs</td><td>${p.total_in_flight} in-flight</td>`;
        peersHtml += p.power_available ? `<td>${p.power_watts}W</td>` : '<td style="color:#8b949e">N/A</td>';
        peersHtml += p.cost_available ? `<td>${p.cost_eur_per_hour.toFixed(2)} EUR/h</td>` : '<td style="color:#8b949e">N/A</td>';
      }
      peersHtml += '</tr></table>';
      if (p.models && p.models.length > 0) {
        peersHtml += '<div class="models">';
        for (const m of p.models) peersHtml += `<span class="model-tag">${escapeHtml(m)}</span>`;
        peersHtml += '</div>';
      }
      peersHtml += '</div>';
    }
  }
  document.getElementById('peers-section').innerHTML = peersHtml;

  // Cluster Models → left column top
  let modelsHtml = '<h2>Cluster Models</h2><div class="models" style="margin-bottom:12px">';
  for (const m of (data.models || [])) modelsHtml += `<span class="model-tag">${escapeHtml(m)}</span>`;
  modelsHtml += '</div>';
  document.getElementById('cluster-models').innerHTML = modelsHtml;

  // Accumulate power history from cluster data
  if (data.local && data.local.power_available) {
    powerHistory.push({t: Math.floor(Date.now()/1000), watts: data.local.power_watts});
    if (powerHistory.length > 720) powerHistory = powerHistory.slice(-720);
    drawPowerGraph();
  }

  // Accumulate host memory history
  if (data.local && data.local.host_mem_total_mb > 0) {
    hostMemTotal = data.local.host_mem_total_mb;
    hostMemHistory.push({t: Math.floor(Date.now()/1000), used: data.local.host_mem_used_mb});
    if (hostMemHistory.length > 720) hostMemHistory = hostMemHistory.slice(-720);
    document.getElementById('hostmem-section').style.display = '';
    const usedGB = (data.local.host_mem_used_mb / 1024).toFixed(1);
    document.getElementById('hostmem-live').textContent = usedGB + ' GB';
    drawHostMemGraph();
  }

  // Update footer
  document.getElementById('footer').textContent = 'viiwork' + (clusterVersion ? ' ' + clusterVersion : '');
}

refresh();
setInterval(refresh, 1000);

// --- GPU Metrics Graphs ---
const GPU_COLORS = [
  '#58a6ff','#3fb950','#d29922','#f85149','#bc8cff',
  '#39d353','#db6d28','#f778ba','#79c0ff','#56d364'
];
let metricsData = {};
let vramTotalMB = {};
let powerHistory = [];
let hostMemHistory = [];
let hostMemTotal = 0;

async function initMetrics() {
  try {
    const resp = await fetch('/v1/metrics');
    const data = await resp.json();
    if (!data.available) {
      document.getElementById('graphs-unavailable').style.display = 'block';
      return;
    }
    document.getElementById('graphs-section').style.display = '';
    metricsData = data.gpus || {};
    for (const [id, samples] of Object.entries(metricsData)) {
      if (samples.length > 0) vramTotalMB[id] = samples[0].vram_total_mb;
    }
    drawAllGraphs();
    startSSE();
  } catch (e) {
    document.getElementById('graphs-unavailable').style.display = 'block';
  }
}

function startSSE() {
  const es = new EventSource('/v1/metrics/stream');
  es.onmessage = (e) => {
    const d = JSON.parse(e.data);
    for (const [id, g] of Object.entries(d.gpus)) {
      if (!metricsData[id]) metricsData[id] = [];
      metricsData[id].push({t: d.t, util: g.util, vram_used_mb: g.vram_used_mb, vram_total_mb: vramTotalMB[id] || 16368});
      if (metricsData[id].length > 720) metricsData[id] = metricsData[id].slice(-720);
    }
    requestAnimationFrame(drawAllGraphs);
  };
}

function drawAllGraphs() {
  drawGraph('graph-util', 'GPU Utilization', 100, '%', s => s.util);
  const maxVRAM = Object.values(vramTotalMB)[0] || 16368;
  drawGraph('graph-vram', 'VRAM Usage', maxVRAM, 'MB', s => s.vram_used_mb);
}

function getGlobalTimeRange() {
  let tMin = Infinity, tMax = -Infinity;
  for (const samples of Object.values(metricsData)) {
    if (samples.length > 0) {
      tMin = Math.min(tMin, samples[0].t);
      tMax = Math.max(tMax, samples[samples.length - 1].t);
    }
  }
  return {tMin: isFinite(tMin) ? tMin : 0, tMax: isFinite(tMax) ? tMax : 1};
}

function drawGraph(canvasId, label, yMax, unit, extractor) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.parentElement.clientWidth || 800;
  const W = canvas.width, H = canvas.height;
  const pad = {l:50, r:10, t:20, b:20};
  const gw = W - pad.l - pad.r, gh = H - pad.t - pad.b;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#21262d';
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px monospace';
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + gh - (i / 4) * gh;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillText((yMax * i / 4).toFixed(0) + unit, 2, y + 4);
  }
  ctx.fillText(label, pad.l, 14);

  const {tMin, tMax} = getGlobalTimeRange();
  const tRange = Math.max(tMax - tMin, 1);

  let gpuIdx = 0;
  for (const [id, samples] of Object.entries(metricsData)) {
    if (samples.length < 2) { gpuIdx++; continue; }
    ctx.strokeStyle = GPU_COLORS[gpuIdx % GPU_COLORS.length];
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < samples.length; i++) {
      const x = pad.l + ((samples[i].t - tMin) / tRange) * gw;
      const val = extractor(samples[i]);
      const y = pad.t + gh - (val / yMax) * gh;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    gpuIdx++;
  }
}

function drawPowerGraph() {
  const canvas = document.getElementById('graph-power');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.parentElement.clientWidth || 800;
  const W = canvas.width, H = canvas.height;
  const pad = {l:50, r:10, t:20, b:20};
  const gw = W - pad.l - pad.r, gh = H - pad.t - pad.b;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  if (powerHistory.length < 2) {
    ctx.fillStyle = '#8b949e';
    ctx.font = '11px monospace';
    ctx.fillText('System Power (accumulating...)', pad.l, 14);
    return;
  }

  const maxW = Math.max(...powerHistory.map(p => p.watts), 100);
  ctx.strokeStyle = '#21262d';
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px monospace';
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + gh - (i / 4) * gh;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillText((maxW * i / 4).toFixed(0) + 'W', 2, y + 4);
  }
  ctx.fillText('System Power', pad.l, 14);

  ctx.strokeStyle = '#f0883e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const tMin = powerHistory[0].t, tMax = powerHistory[powerHistory.length-1].t;
  const tRange = Math.max(tMax - tMin, 1);
  for (let i = 0; i < powerHistory.length; i++) {
    const x = pad.l + ((powerHistory[i].t - tMin) / tRange) * gw;
    const y = pad.t + gh - (powerHistory[i].watts / maxW) * gh;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawHostMemGraph() {
  const canvas = document.getElementById('graph-hostmem');
  if (!canvas || hostMemHistory.length < 2) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.parentElement.clientWidth || 800;
  const W = canvas.width, H = canvas.height;
  const pad = {l:50, r:10, t:20, b:20};
  const gw = W - pad.l - pad.r, gh = H - pad.t - pad.b;
  const yMax = hostMemTotal;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#21262d';
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px monospace';
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + gh - (i / 4) * gh;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    const val = yMax * i / 4;
    const label = val >= 1024 ? (val / 1024).toFixed(0) + 'G' : val.toFixed(0) + 'M';
    ctx.fillText(label, 2, y + 4);
  }
  ctx.fillText('Host Memory Usage', pad.l, 14);

  ctx.strokeStyle = '#bc8cff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const tMin = hostMemHistory[0].t, tMax = hostMemHistory[hostMemHistory.length-1].t;
  const tRange = Math.max(tMax - tMin, 1);
  for (let i = 0; i < hostMemHistory.length; i++) {
    const x = pad.l + ((hostMemHistory[i].t - tMin) / tRange) * gw;
    const y = pad.t + gh - (hostMemHistory[i].used / yMax) * gh;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

let backendRSSHistory = {};
const RSS_HISTORY_MAX = 300; // 5 min at 1s intervals

initMetrics();

// --- Activity Feed ---
const activityLog = document.getElementById('activity-log');
const ACT_COLORS = {backend: '#3fb950', request: '#58a6ff', system: '#d29922'};
const MAX_ACTIVITY_LINES = 100;

function appendActivity(ev) {
  const line = document.createElement('div');
  line.style.padding = '2px 0';
  line.style.borderBottom = '1px solid #21262d';
  const time = new Date(ev.t * 1000).toLocaleTimeString();
  const color = ACT_COLORS[ev.type] || '#8b949e';
  const gpuTag = ev.gpu_id >= 0 ? `<span style="color:${GPU_COLORS[ev.gpu_id % GPU_COLORS.length]}">gpu-${ev.gpu_id}</span> ` : '';
  line.innerHTML = `<span style="color:#484f58">${time}</span> <span style="color:${color}">[${ev.type}]</span> ${gpuTag}${escapeHtml(ev.message)}`;
  activityLog.insertBefore(line, activityLog.firstChild);
  while (activityLog.children.length > MAX_ACTIVITY_LINES) activityLog.removeChild(activityLog.lastChild);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function initActivity() {
  try {
    const resp = await fetch('/v1/activity');
    const data = await resp.json();
    for (const ev of (data.events || [])) appendActivity(ev);
  } catch (e) { /* ignore */ }

  const es = new EventSource('/v1/activity/stream');
  es.onmessage = (e) => {
    try { appendActivity(JSON.parse(e.data)); } catch (err) { /* skip */ }
  };
}

initActivity();

// --- In-Flight Request Timers ---
const inflightSection = document.getElementById('inflight-section');
const inflightList = document.getElementById('inflight-list');
const inflightRequests = new Map(); // key -> {gpu, model, startTime, el}

function inflightColor(seconds) {
  if (seconds < 5) return '#3fb950';   // green: fast
  if (seconds < 15) return '#58a6ff';  // blue: normal
  if (seconds < 30) return '#d29922';  // yellow: slow
  if (seconds < 60) return '#db6d28';  // orange: very slow
  return '#f85149';                     // red: stuck
}

function handleInflightEvent(ev) {
  if (ev.type !== 'request' || !ev.rid) return;
  const msg = ev.message;
  const key = ev.rid;

  // Request done or aborted — remove timer
  if (msg.includes(' done (') || msg.includes(' aborted ')) {
    if (inflightRequests.has(key)) {
      const req = inflightRequests.get(key);
      if (req.el && req.el.parentNode) req.el.remove();
      inflightRequests.delete(key);
    }
    if (inflightRequests.size === 0) inflightSection.style.display = 'none';
    return;
  }

  // New request — add timer
  const el = document.createElement('div');
  el.style.padding = '3px 0';
  el.style.borderBottom = '1px solid #21262d';
  inflightRequests.set(key, {startTime: ev.t * 1000, el, label: msg});
  inflightList.appendChild(el);
  inflightSection.style.display = '';
}

function updateInflightTimers() {
  const now = Date.now();
  for (const [key, req] of inflightRequests) {
    const secs = ((now - req.startTime) / 1000);
    const display = secs < 60 ? secs.toFixed(1) + 's' : Math.floor(secs / 60) + 'm' + Math.floor(secs % 60) + 's';
    const color = inflightColor(secs);
    const gpuMatch = req.label.match(/gpu-(\d+)/);
    const gpuColor = gpuMatch ? GPU_COLORS[parseInt(gpuMatch[1]) % GPU_COLORS.length] : '#8b949e';
    const parts = req.label.split(' → ');
    const model = parts[0] || '';
    const target = parts[1] || '';
    const targetHtml = gpuMatch
      ? `<span style="color:${gpuColor}">${escapeHtml(target)}</span>`
      : escapeHtml(target);
    req.el.innerHTML = `<span style="color:${color};font-weight:bold;min-width:50px;display:inline-block">${display}</span> ${escapeHtml(model)} \u2192 ${targetHtml}`;
  }
  requestAnimationFrame(updateInflightTimers);
}

// Patch appendActivity to also track in-flight
const _origAppendActivity = appendActivity;
appendActivity = function(ev) {
  _origAppendActivity(ev);
  handleInflightEvent(ev);
};

requestAnimationFrame(updateInflightTimers);

// Sync activity log height to right column
function syncActivityHeight() {
  const twoCol = document.querySelector('.two-col');
  const leftCol = twoCol?.children[0];
  const rightCol = twoCol?.children[1];
  const log = document.getElementById('activity-log');
  if (!rightCol || !leftCol || !log) return;
  log.style.maxHeight = 'none';
  const rightH = rightCol.offsetHeight;
  const leftOther = leftCol.offsetHeight - log.offsetHeight;
  const available = rightH - leftOther;
  if (available > 200) log.style.maxHeight = available + 'px';
}
new ResizeObserver(syncActivityHeight).observe(document.querySelector('.two-col'));
</script>
